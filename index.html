<!DOCTYPE html>
<html>
<head>
<title>Study Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My Study Planner</h1>

<div class="planner">

<h2>Add Study Task</h2>

<input type="text" id="taskInput" placeholder="Enter study task">
<button onclick="addTask()">Add Task</button>

<p>Total Tasks: <span id="count">0</span></p>

<ul id="taskList"></ul>

</div>

<div class="links">

<h2>Useful Study Links</h2>

<a href="https://www.w3schools.com" target="_blank">Learn HTML</a>
<br><br>

<a href="https://www.geeksforgeeks.org" target="_blank">Programming Practice</a>
<br><br>

<a href="https://leetcode.com" target="_blank">Coding Practice</a>
<br><br>

<a href="https://www.linkedin.com" target="_blank">Career Learning</a>

</div>

<script src="script.js"></script>

</body>
</html>
